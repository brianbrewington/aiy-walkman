# Walkman user settings (per-device).
# To provision another unit: change the playlist id below, drop in that unit's
# YouTube Music auth file, and set the hostname — nothing else.

[playlist]
# YouTube Music playlist ID — the `list=` value from the playlist URL.
# Set per-device by scripts/walkman-account.sh --playlist <ID>.
id = "REPLACE_WITH_YOUR_PLAYLIST_ID"

[auth]
# This device's YouTube Music auth file (written by walkman-account.sh).
# If it's missing, the LED blinks magenta = "needs setup / re-login".
file = "/home/brew/.config/walkman/ytmusic-auth.json"

[playback]
random = true      # shuffle
repeat = true      # loop the playlist
consume = false    # don't remove tracks as they play

[mopidy]
rpc_url = "http://127.0.0.1:6680/mopidy/rpc"

[button]
gpio = 23                            # BUTTON_GPIO (the bonnet's arcade button)
long_press_seconds = 1.2             # hold this long -> safe shutdown
double_click_window_seconds = 0.35   # second press within this -> "double"

[volume]
step = 5     # Mopidy software-mixer percent per CPX button press
min = 0
max = 70     # kid-safe cap; the calm ALSA baseline still sits underneath this

[led]
max_brightness = 0.65            # global dimmer (0..1) — keep it calm for kids
breathe_period_seconds = 4.0     # "playing" green breathing cycle length

[satellite]
device = "/dev/walkman-cpx"      # CPX CircuitPython data CDC udev symlink
level_hz = 25                    # NeoPixel VU updates per second
volume_feedback_seconds = 2.0    # blue volume bar hold time after a press
brightness = 0.35                # normal green VU brightness
night_mode_volume_brightness = 0.004  # Night-mode volume-cue brightness. 0.004 => blue 1/255, the dimmest
                                      # visible glow (lower rounds to off). Field-tuned for a dark room.
smoothing = 0.4                  # 0..1 current-frame weight for RMS envelope
audio_capture_device = "plughw:CARD=Loopback,DEV=1"
audio_rate = 44100
audio_channels = 2
audio_format = "S16_LE"
meter_floor_rms = 80
meter_ceiling_rms = 12000
# Two-sided meter: pixels 0..4 = loudness (magenta), 9..5 = bass (red), mirrored.
meter_bass_hz_lo = 40.0          # bass band low edge (Hz) — kick/sub
meter_bass_hz_hi = 150.0         # bass band high edge (Hz)
meter_bass_silence = 50.0        # bass-energy floor below which the bass half is dark
# Adaptive auto-ranging (per frame): tracks the signal's own floor/peak so neither half
# pins on a loud-but-flat track. Higher = adapts faster.
meter_peak_decay = 0.08
meter_floor_creep = 0.04
meter_min_span_frac = 0.25       # min window as a fraction of peak (sensitivity)
meter_sync_delay_ms = 0          # delay the lights to match the buffered speaker (tune by eye)
meter_tuning_file = "/tmp/walkman-sync-delay-ms"  # live delay override written by scripts/walkman-meter-tune.py
# Spectrum mode: 10 log-spaced FFT bands, one per pixel (rainbow red=bass -> violet=treble).
meter_mode = "split"             # "split" (loud+bass) | "spectrum" (10-band FFT)
spectrum_band_lo_hz = 40.0       # band 0 low edge (Hz)
spectrum_band_hi_hz = 16000.0    # band 9 high edge (Hz); log-spaced between
spectrum_per_band_autorange = true  # true = every band dances; false = honest spectral shape
spectrum_silence = 50.0          # per-band energy floor below which a band is dark
